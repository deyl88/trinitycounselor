version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# Trinity Counselor — Local Dev Infrastructure
#
# Runs: PostgreSQL + pgvector, Neo4j
# Backend runs locally via `uvicorn` for faster iteration.
#
# Usage:
#   docker compose up -d          # start infra
#   docker compose down           # stop infra
#   docker compose logs -f neo4j  # tail neo4j logs
# ──────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: trinity_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trinity
      POSTGRES_USER: trinity
      POSTGRES_PASSWORD: trinity
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trinity -d trinity"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.20-community
    container_name: trinity_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/changeme
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 1G
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "changeme", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
