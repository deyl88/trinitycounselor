<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c2cb"/>
      <stop offset="100%" stop-color="#7b3fe4"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded background -->
  <rect width="100" height="100" rx="22" fill="#080e1a"/>
  <!-- Connecting lines (draw first, behind dots) -->
  <line x1="50" y1="26" x2="26" y2="70" stroke="url(#g)" stroke-width="2" opacity="0.35"/>
  <line x1="50" y1="26" x2="74" y2="70" stroke="url(#g)" stroke-width="2" opacity="0.35"/>
  <line x1="26" y1="70" x2="74" y2="70" stroke="url(#g)" stroke-width="2" opacity="0.35"/>
  <!-- Three nodes: top (counselor), bottom-left (A), bottom-right (B) -->
  <circle cx="50" cy="26" r="10" fill="url(#g)"/>
  <circle cx="26" cy="70" r="10" fill="url(#g)"/>
  <circle cx="74" cy="70" r="10" fill="url(#g)"/>
</svg>
